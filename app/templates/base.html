<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kronos Stock Advisor{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Kronos Stock Advisor</div>
        <div class="nav-links">
            <a href="/watchlist" class="nav-link {% if request.path == '/watchlist' %}active{% endif %}">自选股</a>
            <a href="/discover" class="nav-link {% if request.path == '/discover' %}active{% endif %}">发现</a>
            <a href="/backtest" class="nav-link {% if request.path == '/backtest' %}active{% endif %}">回测</a>
            <a href="/finetune" class="nav-link {% if request.path == '/finetune' %}active{% endif %}">微调</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>基于 <a href="https://github.com/NeoQuasar/Kronos" target="_blank">Kronos</a> 金融 K 线基础模型 | 分析仅供研究参考，不构成投资建议</p>
    </footer>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
